version: '3.7'
services:

  frontend:
    image: eji4h/docker-workshop-frontend:1.0.0
    restart: always
    environment:
      - API_URL=http://localhost:3000/api/v1
      - MAX_CITY_ID=48356
    ports:
      - 80:80

  backend:
    image: eji4h/docker-workshop-backend:1.0.0
    restart: always
    depends_on:
      - mysql
    environment:
      - PORT=3000
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=myPassword
      - MYSQL_DATABASE=world
    ports:
      - 3000:3000
    
  mysql:
    image: mysql:5.7
    restart: always
    environment:
      - MYSQL_DATABASE=world
      - MYSQL_ROOT_PASSWORD=myPassword
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - ./db/tmp:/var/lib/mysql

  pma:
    image: phpmyadmin/phpmyadmin
    restart: always
    depends_on:
      - mysql
    links:
      - mysql:db
    ports:
      - 8080:80
