version: '3.7'

services:

  backend:
    build: ./backend
    restart: always
    command: start:dev
    environment:
    - PORT=3000
    - MYSQL_HOST=mysql
    - MYSQL_USER=root
    - MYSQL_PASSWORD=myPassword
    - MYSQL_DATABASE=world
    ports:
    - 3000:3000
    volumes:
    - ./backend:/usr/src/app
    
  mysql:
    image: mysql:5.7
    restart: always
    environment:
    - MYSQL_DATABASE=world
    - MYSQL_ROOT_PASSWORD=myPassword
    volumes:
    - ./db/init:/docker-entrypoint-initdb.d
    - ./db/tmp:/var/lib/mysql

  pma:
    image: phpmyadmin/phpmyadmin
    restart: always
    links:
    - mysql:db
    ports:
    - 8080:80

